<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart SMP | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* ===== Background Image Layer ===== */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("bg.png") center center no-repeat;
background-size:contain;
opacity:0.15;
z-index:-2;
animation:zoom 20s infinite alternate ease-in-out;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

/* Dark Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(255,0,80,0.2), black 70%);
z-index:-1;
}

/* ===== Navbar ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:24px;
font-weight:900;
color:#ff2e63;
text-shadow:0 0 15px #ff2e63;
}

.menu{
cursor:pointer;
font-size:26px;
}

/* ===== Hero Section ===== */
.hero{
text-align:center;
padding:100px 20px 50px;
}

.hero h1{
font-size:60px;
font-weight:900;
background:linear-gradient(45deg,#ff2e63,#00c3ff);
-webkit-background-clip:text;
color:transparent;
}

.server-ip{
display:inline-block;
margin-top:25px;
padding:14px 40px;
background:linear-gradient(45deg,#ff2e63,#ff6a00);
border-radius:40px;
font-weight:bold;
box-shadow:0 0 25px #ff2e63;
cursor:pointer;
transition:0.3s;
}

.server-ip:hover{
transform:scale(1.05);
box-shadow:0 0 40px #ff2e63;
}

/* ===== Rank Cards ===== */
.store{
text-align:center;
padding:50px 20px;
}

.rank-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:40px;
}

.rank{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
width:260px;
transition:0.4s;
}

.rank:hover{
transform:translateY(-10px);
box-shadow:0 0 35px #ff2e63;
}

.rank h3{
margin-bottom:10px;
}

.price{
margin:10px 0;
font-weight:bold;
color:#00c3ff;
}

button{
padding:10px 20px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
background:rgba(0,0,0,0.7);
margin-top:60px;
color:#777;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="navbar">
<div class="logo">💖 Heart SMP</div>
<div class="menu">⋮</div>
</div>

<div class="hero">
<h1>HEART SMP</h1>
<div class="server-ip" onclick="copyIP()">play.heartsmp.qzz.io:25655</div>
</div>

<div class="store">
<h2>💎 Premium Ranks</h2>

<div class="rank-container">

<div class="rank">
<h3>VIP</h3>
<p class="price">₹99</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>MVP</h3>
<p class="price">₹199</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Legend</h3>
<p class="price">₹499</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Admin</h3>
<p class="price">₹1499</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Owner</h3>
<p class="price">₹4999</p>
<button>Buy</button>
</div>

</div>
</div>

<footer>
© 2026 Heart SMP | Official Server
</footer>

<script>
function copyIP(){
navigator.clipboard.writeText("play.heartsmp.qzz.io:25655");
alert("Server IP Copied!");
}
</script>

</body>
</html>
