<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart SMP | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url("heartsmp.png") no-repeat center center fixed;
background-size:cover;
color:white;
position:relative;
overflow-x:hidden;
}

/* Dark overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:0;
}

.wrapper{
position:relative;
z-index:1;
}

/* ===== TOP BAR ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(12px);
}

.logo{
font-size:24px;
font-weight:900;
color:#ff2e63;
text-shadow:0 0 15px #ff2e63;
}

.menu{
position:relative;
font-size:28px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:40px;
background:rgba(0,0,0,0.95);
border-radius:12px;
padding:10px;
width:160px;
}

.dropdown a{
display:block;
padding:10px;
color:white;
text-decoration:none;
cursor:pointer;
}

.dropdown a:hover{
background:#ff2e63;
border-radius:6px;
}

.show{
display:block;
}

/* ===== Sections ===== */
.section{
display:none;
padding:100px 20px;
text-align:center;
}

.active{
display:block;
}

/* ===== Home ===== */
.server-ip{
display:inline-block;
margin-top:25px;
padding:14px 40px;
background:linear-gradient(45deg,#ff2e63,#ff8c00);
border-radius:40px;
font-weight:bold;
box-shadow:0 0 25px #ff2e63;
cursor:pointer;
transition:0.3s;
}

.server-ip:hover{
transform:scale(1.05);
box-shadow:0 0 40px #ff2e63;
}

/* ===== Store ===== */
.rank-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
}

.rank{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
width:260px;
transition:0.4s;
}

.rank:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #ff2e63;
}

.rank h3{
margin-bottom:10px;
}

.price{
margin:10px 0;
font-weight:bold;
color:#00c3ff;
}

button{
padding:10px 20px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
}

/* ===== Footer ===== */
footer{
text-align:center;
padding:30px;
background:rgba(0,0,0,0.8);
margin-top:60px;
color:#777;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<div class="logo">💖 Heart SMP</div>

<div class="menu" onclick="toggleMenu()">⋮
<div id="dropdown" class="dropdown">
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('store')">Store</a>
<a onclick="showSection('contact')">Contact</a>
</div>
</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h1 style="font-size:55px;">HEART SMP</h1>

<div class="server-ip" onclick="copyIP()">
play.heartsmp.qzz.io:25655
</div>
</div>

<!-- STORE -->
<div id="store" class="section">
<h2>💎 Server Ranks</h2>

<div class="rank-container">

<div class="rank">
<h3>VIP</h3>
<p class="price">₹99</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>MVP</h3>
<p class="price">₹199</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Legend</h3>
<p class="price">₹499</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Moderator</h3>
<p class="price">₹999</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Admin</h3>
<p class="price">₹1499</p>
<button>Buy</button>
</div>

<div class="rank">
<h3>Owner</h3>
<p class="price">₹4999</p>
<button>Buy</button>
</div>

</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>📩 Join Our Discord</h2>

<a href="https://discord.gg/ZCvYDamuC" target="_blank" 
style="color:#00c3ff;font-weight:bold;text-decoration:none;">
Click Here To Join Discord
</a>

</div>

<footer>
© 2026 Heart SMP | Official Server
</footer>

</div>

<script>
function toggleMenu(){
document.getElementById("dropdown").classList.toggle("show");
}

function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("dropdown").classList.remove("show");
}

function copyIP(){
navigator.clipboard.writeText("play.heartsmp.qzz.io:25655");
alert("Server IP Copied!");
}
</script>

</body>
</html>
