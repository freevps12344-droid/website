<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart SMP | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:url("heartsmp.png") center center no-repeat;
background-size:cover;
background-attachment:fixed;
color:white;
overflow-x:hidden;
animation: zoomBg 20s infinite alternate ease-in-out;
}

@keyframes zoomBg{
0%{background-size:100%;}
100%{background-size:110%;}
}

/* Dark Overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95));
z-index:-1;
}

/* ===== TOPBAR ===== */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
font-weight:900;
color:#ff2e63;
text-shadow:0 0 20px #ff2e63;
}

.menu{
cursor:pointer;
font-size:28px;
}

.dropdown{
display:none;
position:absolute;
right:40px;
top:70px;
background:rgba(0,0,0,0.95);
border-radius:12px;
padding:10px;
width:180px;
}

.dropdown a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.dropdown a:hover{
background:#ff2e63;
}

.show{
display:block;
}

/* ===== HERO SECTION ===== */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
font-weight:900;
background:linear-gradient(45deg,#ff2e63,#ff8c00);
-webkit-background-clip:text;
color:transparent;
}

.server-ip{
margin-top:30px;
padding:16px 45px;
background:linear-gradient(45deg,#ff2e63,#ff8c00);
border-radius:50px;
font-weight:bold;
box-shadow:0 0 30px #ff2e63;
cursor:pointer;
transition:0.3s;
}

.server-ip:hover{
transform:scale(1.08);
}

/* ===== STORE ===== */
.store{
padding:120px 20px;
text-align:center;
background:rgba(0,0,0,0.7);
}

.store h2{
font-size:40px;
margin-bottom:50px;
}

.rank-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.rank{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:270px;
transition:0.4s;
border:1px solid rgba(255,255,255,0.1);
}

.rank:hover{
transform:translateY(-15px);
box-shadow:0 0 35px #ff2e63;
}

.rank h3{
font-size:24px;
margin-bottom:10px;
}

.price{
margin:10px 0;
color:#00c3ff;
font-weight:bold;
}

.buy-btn{
padding:10px 25px;
border:none;
border-radius:30px;
background:#ff2e63;
color:white;
cursor:pointer;
transition:0.3s;
}

.buy-btn:hover{
background:#ff8c00;
}

/* ===== FOOTER ===== */
footer{
text-align:center;
padding:30px;
background:black;
color:#777;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">💖 Heart SMP</div>

<div class="menu" onclick="toggleMenu()">☰</div>
<div id="dropdown" class="dropdown">
<a href="#home">Home</a>
<a href="#store">Store</a>
<a href="https://discord.gg/ZCvYDamuC" target="_blank">Discord</a>
</div>
</div>

<!-- HERO -->
<section class="hero" id="home">
<h1>HEART SMP</h1>

<div class="server-ip" onclick="copyIP()">
play.heartsmp.qzz.io:25655
</div>
</section>

<!-- STORE -->
<section class="store" id="store">
<h2>💎 Premium Ranks</h2>

<div class="rank-container">

<div class="rank">
<h3>VIP</h3>
<p class="price">₹99</p>
<button class="buy-btn" onclick="buyRank()">Buy Now</button>
</div>

<div class="rank">
<h3>MVP</h3>
<p class="price">₹199</p>
<button class="buy-btn" onclick="buyRank()">Buy Now</button>
</div>

<div class="rank">
<h3>Legend</h3>
<p class="price">₹499</p>
<button class="buy-btn" onclick="buyRank()">Buy Now</button>
</div>

<div class="rank">
<h3>Admin</h3>
<p class="price">₹999</p>
<button class="buy-btn" onclick="buyRank()">Buy Now</button>
</div>

<div class="rank">
<h3>Owner</h3>
<p class="price">₹1999</p>
<button class="buy-btn" onclick="buyRank()">Buy Now</button>
</div>

</div>
</section>

<footer>
© 2026 Heart SMP | Official Server
</footer>

<script>
function toggleMenu(){
document.getElementById("dropdown").classList.toggle("show");
}

function copyIP(){
navigator.clipboard.writeText("play.heartsmp.qzz.io:25655");
alert("Server IP Copied!");
}

function buyRank(){
window.open("https://discord.gg/ZCvYDamuC","_blank");
}
</script>

</body>
</html>
