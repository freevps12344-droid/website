<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart SMP | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
background: url("logo.png") no-repeat center center fixed;
background-size: cover;
position: relative;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.7);
z-index:0;
}

.wrapper{
position:relative;
z-index:1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
}

.logo-text{
font-size:22px;
font-weight:900;
color:#ff2e63;
}

.menu{
position:relative;
cursor:pointer;
font-size:26px;
}

.dropdown{
display:none;
position:absolute;
right:0;
top:35px;
background:rgba(0,0,0,0.9);
border-radius:10px;
padding:10px;
width:150px;
}

.dropdown a{
display:block;
padding:8px;
color:white;
text-decoration:none;
cursor:pointer;
}

.dropdown a:hover{
background:#ff2e63;
border-radius:6px;
}

.show{display:block;}

.section{
display:none;
padding:80px 20px;
text-align:center;
}

.active{display:block;}

.server-ip{
display:inline-block;
margin-top:20px;
background:#ff2e63;
padding:12px 35px;
border-radius:30px;
font-weight:bold;
box-shadow:0 0 20px #ff2e63;
cursor:pointer;
}

.rank-section{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:30px;
}

.rank-card{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
margin:15px;
width:240px;
transition:0.4s;
}

.rank-card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #ff2e63;
}

.price{margin:10px 0;font-weight:bold;}

button{
background:#ff2e63;
color:white;
border:none;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.8);
margin-top:40px;
}

a.discord-link{
color:#00bfff;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<div class="logo-text">💖 Heart SMP</div>

<div class="menu" onclick="toggleMenu()">⋮
<div id="dropdown" class="dropdown">
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('store')">Store</a>
<a onclick="showSection('contact')">Contact</a>
</div>
</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h1 style="font-size:50px;">Welcome to Heart SMP</h1>

<!-- IP UPDATED HERE -->
<div class="server-ip" onclick="copyIP()">
IP: play.heartsmp.qzz.io:25655
</div>

</div>

<!-- STORE -->
<div id="store" class="section">
<h2>💎 Premium Ranks</h2>

<div class="rank-section">
<div class="rank-card"><h3>VIP</h3><p class="price">₹99</p><button>Buy</button></div>
<div class="rank-card"><h3>MVP</h3><p class="price">₹199</p><button>Buy</button></div>
<div class="rank-card"><h3>Legend</h3><p class="price">₹499</p><button>Buy</button></div>
<div class="rank-card"><h3>Admin</h3><p class="price">₹1499</p><button>Buy</button></div>
<div class="rank-card"><h3>Owner</h3><p class="price">₹4999</p><button>Buy</button></div>
</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
<h2>📩 Join Our Discord</h2>

<!-- DISCORD FIXED -->
<p>
<a class="discord-link" href="https://discord.gg/ZCvYDamuC" target="_blank">
Click Here to Join Discord
</a>
</p>

</div>

<footer>
© 2026 Heart SMP | Official Server
</footer>

</div>

<script>
function toggleMenu(){
document.getElementById("dropdown").classList.toggle("show");
}

function showSection(id){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("dropdown").classList.remove("show");
}

function copyIP(){
navigator.clipboard.writeText("play.heartsmp.qzz.io:25655");
alert("Server IP Copied!");
}
</script>

</body>
</html>
